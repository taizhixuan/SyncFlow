packages:
  - 'apps/*'
  - 'packages/*'

# Allow postinstall build scripts only for these trusted toolchain packages.
onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  core-js: false
  esbuild: true
  prisma: true
