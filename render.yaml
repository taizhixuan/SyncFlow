## SyncFlow — Render Blueprint (API + Redis)
## Deploy: connect the repo in the Render dashboard → "New → Blueprint Instance"
## pointing at this file. Set sync:false secrets manually in the service's
## environment panel (see DEPLOY.md for the full, step-by-step list).
##
## Topology: the FRONTEND is hosted on Vercel and POSTGRES on Supabase — so this
## blueprint provisions only the NestJS API (Docker) and a managed Redis used for
## cross-instance pub/sub. DATABASE_URL is entered manually (Supabase pooler URL);
## REDIS_URL is wired from the Redis service below.

services:
  # ── API (NestJS + Socket.io) ─────────────────────────────────────────────────
  - type: web
    name: syncflow-api
    runtime: docker
    dockerfilePath: ./docker/api.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3000"
      # Postgres lives on Supabase. Paste the Session Pooler connection string
      # (IPv4, port 5432) here — Render's network is IPv4-only and Supabase's
      # direct db.<ref> host is IPv6-only, so the pooler is required. The session
      # pooler (not the 6543 transaction pooler) is needed for Prisma migrations.
      # See DEPLOY.md → "Step 1: Supabase Postgres".
      - key: DATABASE_URL
        sync: false
      # Wired from the managed Redis instance defined below.
      - key: REDIS_URL
        fromService:
          name: syncflow-redis
          type: redis
          property: connectionString
      # Full https:// URL(s) of the web app — used for CORS. Comma-separated for
      # multiple (apex + www). Set manually (sync:false): a bare hostname has no
      # scheme and the browser Origin header always includes https://, so CORS
      # would fail. e.g. https://syncflows.xyz,https://www.syncflows.xyz
      - key: WEB_ORIGIN
        sync: false
      # JWT secrets — long random strings (≥ 32 chars), must differ from each other.
      # Generate with: openssl rand -hex 32
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # AWS S3 (image uploads). With path-style URLs the public asset URL is
      # `${S3_ENDPOINT}/${S3_BUCKET}/${key}`, so set:
      #   S3_ENDPOINT          = https://s3.<region>.amazonaws.com
      #   S3_REGION            = <region>            e.g. us-east-1
      #   S3_BUCKET            = <your-bucket>
      #   S3_ACCESS_KEY        = <IAM access key id>
      #   S3_SECRET_KEY        = <IAM secret access key>
      # See DEPLOY.md → "Step 2: AWS S3".
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      # Path-style addressing so the presigned upload URL and the stored public
      # asset URL agree (https://s3.<region>.amazonaws.com/<bucket>/<key>).
      - key: S3_FORCE_PATH_STYLE
        value: "true"

  # ── Redis (key-value) ────────────────────────────────────────────────────────
  # Render Redis-compatible key-value service; REDIS_URL wired above via
  # fromService / property: connectionString. Used for board pub/sub fan-out
  # across API instances.
  - type: redis
    name: syncflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    # Empty allow list = no public ingress; only Render's private network (the
    # API service) can reach it. Render requires this field on key-value services.
    ipAllowList: []
