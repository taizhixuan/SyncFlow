## SyncFlow — Render Blueprint
## Deploy: connect the repo in the Render dashboard → "New Blueprint Instance"
## pointing at this file. Set sync:false secrets manually in each service's
## environment panel (see DEPLOY.md for the full list).

services:
  # ── API (NestJS) ────────────────────────────────────────────────────────────
  - type: web
    name: syncflow-api
    runtime: docker
    dockerfilePath: ./docker/api.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3000"
      # Wired from the managed Postgres database defined below
      - key: DATABASE_URL
        fromDatabase:
          name: syncflow-db
          property: connectionString
      # Wired from the managed Redis instance defined below
      - key: REDIS_URL
        fromService:
          name: syncflow-redis
          type: redis
          property: connectionString
      # Wired from the web static site so the CORS allow-list stays in sync
      - key: WEB_ORIGIN
        fromService:
          name: syncflow-web
          type: web
          property: host
      # JWT secrets — set manually in the Render dashboard (sync: false)
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # S3 / MinIO credentials — set manually in the Render dashboard
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"

  # ── Web (Vite static site) ──────────────────────────────────────────────────
  - type: web
    name: syncflow-web
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @syncflow/shared build && pnpm --filter @syncflow/web build
    staticPublishPath: apps/web/dist
    pullRequestPreviewsEnabled: true
    routes:
      # SPA catch-all — serve index.html for every path
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Vite replaces import.meta.env.VITE_API_URL at build time.
      # Point at the api service's public URL.
      - key: VITE_API_URL
        fromService:
          name: syncflow-api
          type: web
          property: host
      # Socket.io sync URL
      - key: VITE_SYNC_URL
        fromService:
          name: syncflow-api
          type: web
          property: host

  # ── Redis (key-value) ──────────────────────────────────────────────────────
  # Render Redis-compatible key-value service.
  # Referenced above via fromService / property: connectionString.
  - type: redis
    name: syncflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  # ── Managed Postgres ────────────────────────────────────────────────────────
  - name: syncflow-db
    plan: free
    databaseName: syncflow
    user: syncflow
